monitor=,preffered,auto,1.6

# Move focus with mainMod + arrow keys
unbind = SUPER, H
unbind = SUPER, L
unbind = SUPER, K
unbind = SUPER, J
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d
# rebind to select ALL
unbind = SUPER, A
bindd = SUPER, A, Universal select all, sendshortcut, CTRL, A, activewindow

bindd = SUPER, Q, Toggle window split, togglesplit
bindd = SUPER, XF86AudioRaiseVolume, Combine all audio outputs to one, exec, pactl load-module module-combine-sink
bindd = SUPER, XF86AudioLowerVolume, Separate all audio outputs, exec, pactl unload-module module-combine-sink

# open app on workspace it has been called from
misc {
    initial_workspace_tracking = 2
}

windowrule = float off, match:class (?i)^steam$, match:title (?i)^steam$
windowrule = center off, match:class (?i)^steam$, match:title (?i)^steam$
windowrule = workspace 5 silent, match:class (?i)^steam$, match:title (?i)^steam$
